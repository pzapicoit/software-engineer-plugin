# .intermarkit/config.yaml
# Configuracion del proyecto para el plugin IntermarkIt.
# Copia este fichero a .intermarkit/config.yaml en la raiz de tu proyecto
# y completa los valores.
#
# El plugin generara adicionalmente (no commitear, ver .gitignore recomendado en el README):
#   - .intermarkit/task-metrics/  → metricas por tarea (tool_calls, tiempos)
#   - .intermarkit/cache/         → cache local de respuestas MCP (Atlassian, Bitbucket)
#   - .intermarkit/architecture.md, functional.md → documentacion generada por la skill architect (esta si va al repo)

jira:
  site: https://intermarkit.atlassian.net
  project: PROJ  # Clave del proyecto Jira (ej: PROJ, DEV, WEB)

# --- Repositorio(s) ---
# Usa UNA de las dos opciones siguientes, nunca ambas. Si el fichero define
# `repos:` (lista), tiene prioridad y `repo:` (si tambien estuviera) se ignora.

# Opcion A) Proyecto de un solo repositorio (caso mas comun).
repo:
  type: bitbucket             # bitbucket | github | gitlab
  url: https://bitbucket.org/intermarkithub/nombre-repo
  workspace: intermarkithub   # workspace slug de Bitbucket (solo para bitbucket)
  default_branch: main        # rama principal del repositorio

# Opcion B) Proyecto multi-repo (frontend, backend, mobile, etc. en subcarpetas
# del mismo proyecto). Descomenta el bloque `repos:` y borra (o deja comentado)
# el bloque `repo:` de arriba.
#
# repos:
#   - name: frontend               # identificador corto, se usa en ramas/PRs/preguntas del agente
#     path: frontend                # subcarpeta relativa a la raiz del proyecto (debe ser un repo Git valido)
#     type: bitbucket               # bitbucket | github | gitlab
#     url: https://bitbucket.org/intermarkithub/frontend-repo
#     workspace: intermarkithub     # solo si type: bitbucket
#     default_branch: main
#   - name: backend
#     path: backend
#     type: bitbucket
#     url: https://bitbucket.org/intermarkithub/backend-repo
#     workspace: intermarkithub
#     default_branch: main

docs:
  confluence_space: ""  # Opcional: clave del espacio Confluence (ej: DEV)
  url: ""               # Opcional: URL de documentacion externa
